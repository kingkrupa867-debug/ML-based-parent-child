services:
  - type: web
    name: parent-child-analyzer-backend
    env: python
    region: oregon
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn communication_analyzer.wsgi:application
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*.render.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://parent-child-analyzer-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://parent-child-analyzer-frontend.onrender.com"

  - type: static_site
    name: parent-child-analyzer-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    rootDir: frontend
    publishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: "https://parent-child-analyzer-backend.onrender.com"
